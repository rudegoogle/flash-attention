name: Build Windows Wheels (Python 3.13, CUDA 13.2)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    
    env:
      CUDA_ARCH: "80;90;100;120"
      CXX11_ABI: "FALSE"
      # Suppresses the Node 20 deprecation warning for actions that haven't updated yet
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true 

    steps:
      - name: Enable Git long paths
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install CUDA Toolkit 13.2
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '13.2.0'
          method: 'network'
        continue-on-error: true 

      - name: Fallback to pre-installed CUDA (if network install fails)
        if: steps.cuda-toolkit.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Host "Network install failed. Searching for pre-installed CUDA..."
          $cudaBase = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA"
          $cudaPath = $null
          
          # 1. Check if the standard CUDA directory exists
          if (Test-Path $cudaBase) {
            # Search for any v13.* folder
            $cudaPath = Get-ChildItem $cudaBase -Directory | Where-Object { $_.Name -match "v13" } | Select-Object -First 1 -ExpandProperty FullName
          }
          
          # 2. If not found, check if nvcc is already in the system PATH
          if (-not $cudaPath) {
            $nvccCmd = Get-Command nvcc -ErrorAction SilentlyContinue
            if ($nvccCmd) {
              $cudaPath = Split-Path (Split-Path $nvccCmd.Source)
            }
          }
          
          # 3. Apply the found path or fail gracefully
          if ($cudaPath) {
            echo "CUDA_PATH=$cudaPath" >> $env:GITHUB_ENV
            echo "$cudaPath\bin" >> $env:GITHUB_PATH
            Write-Host "Successfully set CUDA_PATH to $cudaPath"
          } else {
            Write-Error "No CUDA 13.x toolkit found on the runner or via network!"
            exit 1
          }

      - name: Verify NVCC
        shell: cmd
        run: nvcc --version

      - name: Install PyTorch (cu132)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cu132

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Run Build Script
        shell: cmd
        run: WindowsWhlBuilder_cuda.bat FORCE_CXX11_ABI %CXX11_ABI% CUDA_ARCH %CUDA_ARCH%

      - name: Upload Wheel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flash-attn-windows-py313-cu132
          path: dist/*.whl
          if-no-files-found: error
