name: Build Windows Wheels (Python 3.13, CUDA 13.2)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    
    env:
      # Set the target architectures and ABI flag to pass into your bat file
      CUDA_ARCH: "80;90;100;120"
      CXX11_ABI: "FALSE"

    steps:
      - name: Enable Git long paths
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install CUDA Toolkit 13.2
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '13.2' # Changed from 13.2.0 to 13.2
          method: 'network'
        continue-on-error: true # Continue if the action can't find the network package

      - name: Fallback to pre-installed CUDA (if network install fails)
        if: steps.cuda-toolkit.outcome == 'failure'
        shell: pwsh
        run: |
          Write-Host "Network install failed. Attempting to use pre-installed CUDA..."
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.2"
          if (Test-Path $cudaPath) {
            echo "$cudaPath\bin" >> $env:GITHUB_PATH
            echo "CUDA_PATH=$cudaPath" >> $env:GITHUB_ENV
            Write-Host "Found pre-installed CUDA at $cudaPath"
          } else {
            # Search for any v13.* if exact match isn't there yet
            $cudaPath = Get-ChildItem "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\" -Directory | Where-Object { $_.Name -match "v13" } | Select-Object -First 1 -ExpandProperty FullName
            if ($cudaPath) {
              echo "$cudaPath\bin" >> $env:GITHUB_PATH
              echo "CUDA_PATH=$cudaPath" >> $env:GITHUB_ENV
              Write-Host "Found fallback pre-installed CUDA at $cudaPath"
            } else {
              Write-Error "No CUDA 13.x toolkit found on the runner!"
              exit 1
            }
          }

      - name: Verify NVCC
        shell: cmd
        run: nvcc --version

      - name: Install PyTorch (cu132)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cu132

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Run Build Script
        shell: cmd
        run: WindowsWhlBuilder_cuda.bat FORCE_CXX11_ABI %CXX11_ABI% CUDA_ARCH %CUDA_ARCH%

      - name: Upload Wheel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flash-attn-windows-py313-cu132
          path: dist/*.whl
          if-no-files-found: error # Fails the job if the wheel isn't generated
