name: Build Windows Wheels (Python 3.13, CUDA 13.2)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    
    env:
      # Set the target architectures and ABI flag to pass into your bat file
      CUDA_ARCH: "80;90;100;120"
      CXX11_ABI: "FALSE"

    steps:
      - name: Enable Git long paths
        run: git config --system core.longpaths true
    
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install CUDA Toolkit 13.2
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '13.2.0'
          method: 'network'
          # GitHub Actions runners typically have ~4 cores. FlashAttention compilation
          # is memory intensive, but 4 is usually safe on CI. Your bat file enforces MAX_JOBS=4.
        id: cuda-toolkit

      - name: Install PyTorch (cu132)
        run: |
          python -m pip install --upgrade pip
          # By June 2026, PyTorch stable should fully support Python 3.13 and CUDA 13.2
          # Using the cu132 index URL. Adjust if PyTorch uses a different naming convention.
          pip install torch --index-url https://download.pytorch.org/whl/cu132

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Run Build Script
        shell: cmd
        run: WindowsWhlBuilder_cuda.bat FORCE_CXX11_ABI %CXX11_ABI% CUDA_ARCH %CUDA_ARCH%

      - name: Upload Wheel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flash-attn-windows-py313-cu132
          path: dist/*.whl
          if-no-files-found: error # Fails the job if the wheel isn't generated
